name: Deploy ActivLine-Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "."
          target: "/home/ubuntu/ActivLine-Backend"
          rm: true

      - name: Deploy & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/ActivLine-Backend

            echo "${{ secrets.ENV_FILE }}" > .env

            npm install --production

            pm2 restart ActivLine-Backend || pm2 start server.js --name ActivLine-Backend

            pm2 save

            sudo systemctl restart nginx