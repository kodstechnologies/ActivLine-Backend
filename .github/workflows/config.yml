name: Deploy ActivLine-Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "."
          target: "/home/ubuntu/ActivLine-Backend"
          rm: true

      - name: Deploy & Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/ActivLine-Backend

            # Write .env from GitHub secret (preserve newlines)
            printf '%s' "${{ secrets.ENV_FILE }}" > .env

            # Write Firebase service account JSON from base64 secret
            # Create a GitHub secret named FIREBASE_ADMIN_JSON_B64 with the base64 of your JSON file
            echo "${{ secrets.FIREBASE_ADMIN_JSON_B64 }}" | base64 -d > src/config/firebase-admin.json

            chmod 600 .env src/config/firebase-admin.json

            npm install --production

            pm2 restart ActivLine-Backend || pm2 start server.js --name ActivLine-Backend

            pm2 save

            sudo systemctl restart nginx
